<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abhi-things</title>
    <meta name="description" content="Abhi-things — a curated collection of things I love">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

    <!-- Top Sticky Header -->
    <nav class="top-nav">
        <div class="nav-container">
            <div class="nav-left">
                <a href="index.html" class="nav-brand">ABHI-THINGS</a>
            </div>

            <div class="nav-right">
                <a href="https://x.com/shawarmawomayo" target="_blank" class="social-link">TW</a>
                <span class="nav-slash">/</span>
                <a href="https://www.linkedin.com/in/abhibny/" target="_blank" class="social-link">LI</a>
            </div>
        </div>
    </nav>

    <!-- Main Masonry Grid Container -->
    <main id="masonry-grid" class="container masonry-container">
        <!-- Dynamically built by main.js based on active viewport resolution -->
    </main>

    <!-- Cycle Lightbox Modal for Art/Illustrations -->
    <div id="lightbox" class="lightbox">
        <button id="lightbox-close" class="lightbox-close" aria-label="Close lightbox">&times;</button>
        <button id="lightbox-prev" class="lightbox-nav lightbox-prev" aria-label="Previous image">&#8249;</button>

        <div class="lightbox-content">
            <img id="lightbox-img" class="lightbox-image" src="" alt="Maximized illustration">
            <div id="lightbox-caption" class="lightbox-caption">Illustration Title</div>
        </div>

        <button id="lightbox-next" class="lightbox-nav lightbox-next" aria-label="Next image">&#8250;</button>
    </div>

    <!-- Sticky Footer -->
    <footer>
        <div class="footer-container">
            <span>Abhi-things / 2026</span>
            <a href="mailto:abhishekbenny98@gmail.com" class="footer-email">abhishekbenny98@gmail.com</a>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="assets/js/portfolio.js"></script>
</body>

</html>
